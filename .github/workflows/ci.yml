# ==============================================================================
# CI — lint, compile check, and tests (PostgreSQL for pytest when CI=true)
# ==============================================================================
name: CI

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main, staging]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: Lint & static checks
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Python (from .python-version)
        run: uv python install

      - name: Install dependencies (lockfile)
        run: uv sync --group dev --frozen

      - name: Ruff lint
        run: uv run ruff check .

      - name: Ruff format
        run: uv run ruff format --check .

      - name: Bytecode compile (syntax smoke test)
        run: uv run python -m compileall -q app run.py scripts tests

  test:
    name: Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: hackathon_db
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      CI: "true"
      DATABASE_NAME: hackathon_db
      DATABASE_HOST: localhost
      DATABASE_PORT: "5432"
      DATABASE_USER: postgres
      DATABASE_PASSWORD: postgres

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Python (from .python-version)
        run: uv python install

      - name: Install dependencies (lockfile)
        run: uv sync --group dev --frozen

      - name: Run tests
        run: uv run pytest -v --tb=short --junitxml=junit.xml

      - name: Upload pytest JUnit (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-junit
          path: junit.xml
          if-no-files-found: ignore

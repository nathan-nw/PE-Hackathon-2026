      # - name: Build Docker image
      #   run: docker build -t my-app:staging .
      # - name: Push to registry
      #   run: docker push my-registry/my-app:staging
      # ========================================================================
      - name: Deploy to staging (placeholder)
        run: |
          echo "========================================="
          echo "  STAGING DEPLOYMENT PLACEHOLDER"
          echo "========================================="
          echo "Replace this step with your actual deployment commands."
          echo "See the comments above for examples."
          echo "Branch: ${{ github.ref_name }}"
          echo "Commit: ${{ github.sha }}"

  deploy-production:
    # --------------------------------------------------------------------------
    # Production deployment: runs only when code is merged into main.
    # This is your live, user-facing environment.
    # --------------------------------------------------------------------------
    name: Deploy to Production
    if: github.ref_name == 'main'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    environment:
      name: production
      url: https://example.com

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install

      - name: Install dependencies
        run: uv sync

      # ========================================================================
      # PLACEHOLDER: Replace with your production deployment commands.
      # See the staging job above for provider-specific examples.
      # ========================================================================
      - name: Deploy to production (placeholder)
        run: |
          echo "========================================="
          echo "  PRODUCTION DEPLOYMENT PLACEHOLDER"
          echo "========================================="
          echo "Replace this step with your actual deployment commands."
          echo "Branch: ${{ github.ref_name }}"
          echo "Commit: ${{ github.sha }}"

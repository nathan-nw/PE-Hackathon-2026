# ==============================================================================
# Deployment Pipeline — Triggers when code is merged into staging or main
# ==============================================================================
# This workflow handles deployments after code passes CI and is merged.
# - Merges to staging  → deploy to the staging environment
# - Merges to main     → deploy to the production environment
#
# The deployment steps are currently placeholders. Replace them with your
# actual deployment commands once you choose a hosting provider.
# ==============================================================================

name: Deploy

# ------------------------------------------------------------------------------
# Trigger: Run only on pushes (merges) to staging and main branches.
# Pull requests do NOT trigger this workflow — that's handled by ci.yml.
# ------------------------------------------------------------------------------
on:
  push:
    branches: [main, staging]

# ------------------------------------------------------------------------------
# Only one deployment per branch at a time.
# If a new merge happens while deploying, the old deploy is cancelled.
# ------------------------------------------------------------------------------
concurrency:
  group: deploy-${{ github.ref_name }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy-staging:
    # --------------------------------------------------------------------------
    # Staging deployment: runs only when code is merged into the staging branch.
    # This is your pre-production environment for testing before release.
    # --------------------------------------------------------------------------
    name: Deploy to Staging
    if: github.ref_name == 'staging'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    # --------------------------------------------------------------------------
    # GitHub Environment: links this job to a "staging" environment in GitHub.
    # You can add environment-specific secrets and protection rules in
    # Settings → Environments. The URL is a placeholder — update it later.
    # --------------------------------------------------------------------------
    environment:
      name: staging
      url: https://staging.example.com

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install

      - name: Install dependencies
        run: uv sync

      # ========================================================================
      # PLACEHOLDER: Replace the steps below with your actual deployment.
      #
      # Examples for common providers:

# Railway private DNS: <service-name>.railway.internal (see https://docs.railway.com/reference/private-networking)
# API replicas use PORT=8080 from setup-railway.js (Gunicorn).

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: url-shortener
    metrics_path: /metrics
    static_configs:
      - targets:
          - url-shortener-a.railway.internal:8080
          - url-shortener-b.railway.internal:8080
        labels:
          service: url-shortener

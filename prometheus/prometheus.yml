# Scrape API replicas directly on the Docker internal network (not through NGINX).
# UI: http://localhost:9090  |  Alertmanager UI: http://localhost:9093

global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  - job_name: url-shortener
    metrics_path: /metrics
    static_configs:
      - targets:
          - url-shortener-a:5000
          - url-shortener-b:5000
        labels:
          service: url-shortener

  - job_name: prometheus
    static_configs:
      - targets:
          - localhost:9090

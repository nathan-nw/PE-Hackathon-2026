apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-frontend
  namespace: pe-hackathon
  labels:
    app: user-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: user-frontend
  template:
    metadata:
      labels:
        app: user-frontend
    spec:
      containers:
        - name: user-frontend
          image: pe-hackathon/user-frontend:latest
          imagePullPolicy: IfNotPresent
          env:
            # URL the browser uses for the API (port-forward to load-balancer per k8s/README).
            - name: BACKEND_URL
              value: "http://localhost:30880"
          ports:
            - name: http
              containerPort: 3000
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 2
            periodSeconds: 10
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              memory: 256Mi

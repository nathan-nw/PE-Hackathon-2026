apiVersion: v1
kind: ConfigMap
metadata:
  name: alertmanager-config
  namespace: pe-hackathon
data:
  alertmanager.yml: |
    global:
      resolve_timeout: 5m

    route:
      receiver: default
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 12h

    receivers:
      - name: default
        webhook_configs:
          - url: http://127.0.0.1:9
            send_resolved: false

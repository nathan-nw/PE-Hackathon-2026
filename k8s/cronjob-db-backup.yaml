apiVersion: batch/v1
kind: CronJob
metadata:
  name: db-backup
  namespace: pe-hackathon
spec:
  schedule: "0 3 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: pg-dump
              image: postgres:16-alpine
              command:
                - /bin/sh
                - -c
                - |
                  set -e
                  export PGPASSWORD="$POSTGRES_PASSWORD"
                  OUT="/backups/hackathon_db-$(date +%Y%m%d-%H%M).sql.gz"
                  pg_dump -h db -U postgres hackathon_db | gzip > "$OUT"
                  echo "Wrote $OUT"
                  find /backups -name 'hackathon_db-*.sql.gz' -mtime +7 -delete
              env:
                - name: POSTGRES_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: postgres-secret
                      key: password
              volumeMounts:
                - name: backups
                  mountPath: /backups
              resources:
                requests:
                  cpu: 100m
                  memory: 128Mi
                limits:
                  memory: 512Mi
          volumes:
            - name: backups
              persistentVolumeClaim:
                claimName: pg-backups

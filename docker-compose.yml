# Stable project name (Compose v2.20+) — helps consistent container/network naming on Windows.
name: pe-hackathon-2026

services:
  db:
    image: postgres:16-alpine
    container_name: hackathon_db
    restart: always
    networks:
      - app_net
    environment:
      POSTGRES_DB: hackathon_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "15432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  url-shortener-a:
    build:
      context: ./url-shortener
    # `init` gives PID 1 to Docker’s tini — better signal handling than raw gunicorn as PID 1.
    init: true
    # `always`: stateless replicas should come back after kill/crash/OOM. (`unless-stopped`
    # often leaves replicas dead after `docker kill` — bad for chaos tests.)
    # Docker inspect: `State.Restarting` is only true *during* a restart; exited containers
    # always show `Restarting: false`. See ARCHITECTURE.md → "Docker inspect".
    restart: always
    networks:
      - app_net
    environment:
      INSTANCE_ID: "1"
      DATABASE_NAME: hackathon_db
      DATABASE_HOST: db
      DATABASE_PORT: "5432"
      DATABASE_USER: postgres
      DATABASE_PASSWORD: postgres
      FLASK_DEBUG: "false"
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "5000"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:5000/live"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 25s

  url-shortener-b:
    build:
      context: ./url-shortener
    init: true
    restart: always
    networks:
      - app_net
    environment:
      INSTANCE_ID: "2"
      DATABASE_NAME: hackathon_db
      DATABASE_HOST: db
      DATABASE_PORT: "5432"
      DATABASE_USER: postgres
      DATABASE_PASSWORD: postgres
      FLASK_DEBUG: "false"
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "5000"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:5000/live"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 25s

  load-balancer:
    build:
      context: ./load-balancer
      dockerfile: Dockerfile
    restart: always
    networks:
      - app_net
    ports:
      - "8080:80"
      - "8081:8081"
    depends_on:
      url-shortener-a:
        condition: service_healthy
      url-shortener-b:
        condition: service_healthy

  prometheus:
    image: prom/prometheus:v2.54.1
    restart: unless-stopped
    networks:
      - app_net
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/rules:/etc/prometheus/rules:ro
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=15d
      - --web.enable-lifecycle
    depends_on:
      url-shortener-a:
        condition: service_healthy
      url-shortener-b:
        condition: service_healthy
      alertmanager:
        condition: service_started

  alertmanager:
    image: prom/alertmanager:v0.27.0
    restart: unless-stopped
    networks:
      - app_net
    ports:
      - "9093:9093"
    volumes:
      - ./alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    command:
      - --config.file=/etc/alertmanager/alertmanager.yml

  db-backup:
    image: prodrigestivill/postgres-backup-local:16
    restart: unless-stopped
    networks:
      - app_net
    environment:
      POSTGRES_HOST: db
      POSTGRES_DB: hackathon_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      SCHEDULE: "@daily"
      BACKUP_DIR: /backups
      BACKUP_KEEP_DAYS: "7"
    volumes:
      - pg_backups:/backups
    depends_on:
      db:
        condition: service_healthy

  dashboard:
    build:
      context: ./dashboard
    restart: always
    networks:
      - app_net
    ports:
      - "3001:80"

  user-frontend:
    build:
      context: ./user-frontend
    restart: always
    networks:
      - app_net
    ports:
      - "3002:80"

networks:
  app_net:
    driver: bridge

volumes:
  pgdata:
  pg_backups:

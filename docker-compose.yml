services:
  db:
    image: postgres:16-alpine
    container_name: hackathon_db
    restart: always
    environment:
      POSTGRES_DB: hackathon_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    # Host 15432 avoids clashing with a local PostgreSQL on 5432 (common on Windows).
    ports:
      - "15432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  url-shortener-a:
    build:
      context: ./url-shortener
    restart: unless-stopped
    environment:
      DATABASE_NAME: hackathon_db
      DATABASE_HOST: db
      DATABASE_PORT: "5432"
      DATABASE_USER: postgres
      DATABASE_PASSWORD: postgres
      FLASK_DEBUG: "false"
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "5000"

  url-shortener-b:
    build:
      context: ./url-shortener
    restart: unless-stopped
    environment:
      DATABASE_NAME: hackathon_db
      DATABASE_HOST: db
      DATABASE_PORT: "5432"
      DATABASE_USER: postgres
      DATABASE_PASSWORD: postgres
      FLASK_DEBUG: "false"
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "5000"

  load-balancer:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./load-balancer/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - url-shortener-a
      - url-shortener-b

  dashboard:
    build:
      context: ./dashboard
    ports:
      - "3001:80"

  user-frontend:
    build:
      context: ./user-frontend
    ports:
      - "3002:80"

volumes:
  pgdata:

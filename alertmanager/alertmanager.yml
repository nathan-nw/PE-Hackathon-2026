# Alertmanager → Discord via dashboard-backend webhook.
# UI: http://localhost:9093

global:
  resolve_timeout: 5m

route:
  receiver: discord
  group_by: ['alertname', 'severity']
  group_wait: 10s
  group_interval: 1m
  repeat_interval: 4h
  routes:
    - match:
        severity: critical
      receiver: discord
      repeat_interval: 15m

receivers:
  - name: discord
    webhook_configs:
      - url: http://dashboard-backend:8000/api/alertmanager-webhook
        send_resolved: true

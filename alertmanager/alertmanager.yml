# Dev/staging defaults: no external integrations. Add Slack/PagerDuty/Opsgenie webhooks in production.
# UI: http://localhost:9093

global:
  resolve_timeout: 5m

route:
  receiver: default
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 12h

receivers:
  - name: default
    # Delivery intentionally fails fast in Compose (nothing listens on discard port inside the network).
    # Replace with a real webhook URL or email_config for production.
    webhook_configs:
      - url: http://127.0.0.1:9
        send_resolved: false

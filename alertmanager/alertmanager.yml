# Alertmanager config — routes Prometheus alerts to Discord via dashboard-backend bridge.
# UI: http://localhost:9093

global:
  resolve_timeout: 5m

route:
  receiver: discord
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 1h
  routes:
    - match:
        severity: critical
      receiver: discord
      repeat_interval: 15m

receivers:
  - name: discord
    webhook_configs:
      - url: http://dashboard-backend:8000/api/alertmanager-webhook
        send_resolved: true

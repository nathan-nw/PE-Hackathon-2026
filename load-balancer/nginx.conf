worker_processes auto;
error_log /var/log/nginx/error.log warn;

events {
    worker_connections 2048;
    multi_accept on;
}

http {
    # --- Connection & buffering tuning for high concurrency ---
    keepalive_timeout 65;
    keepalive_requests 1000;
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;

    # Larger buffers prevent 502s when app responses are chunky
    proxy_buffer_size 16k;
    proxy_buffers 8 16k;
    proxy_busy_buffers_size 32k;

    upstream url_shortener {
        least_conn;
        server url-shortener-a:5000;
        server url-shortener-b:5000;

        # Keep persistent connections to upstream — avoids TCP handshake per request
        keepalive 32;
    }

    server {
        listen 80;
        server_name _;

        location / {
            proxy_pass http://url_shortener;
            proxy_http_version 1.1;

            # Required for upstream keepalive
            proxy_set_header Connection "";

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Timeouts — fail fast rather than queue forever
            proxy_connect_timeout 5s;
            proxy_read_timeout 30s;
            proxy_send_timeout 10s;
        }

        # Dedicated health check endpoint — lightweight, no upstream buffering needed
        location /health {
            proxy_pass http://url_shortener;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_read_timeout 5s;
        }
    }
}

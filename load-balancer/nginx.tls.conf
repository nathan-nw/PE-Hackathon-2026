# HTTP + HTTPS (TLS) for url-shortener replicas. Self-signed dev certs baked in Dockerfile.tls.
# HSTS is sent only on HTTPS responses. See ../ARCHITECTURE.md.

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 2048;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65s;

    log_format main_timed '$remote_addr - $remote_user [$time_local] '
        '"$request" $status $body_bytes_sent '
        '"$http_referer" "$http_user_agent" '
        'rt=$request_time urt=$upstream_response_time uaddr=$upstream_addr '
        'ust=$upstream_status rid=$trace_id';

    access_log /var/log/nginx/access.log main_timed;

    map $http_x_request_id $trace_id {
        ~.+ $http_x_request_id;
        default $request_id;
    }

    # Must match docker-compose default LOAD_TEST_BYPASS_TOKEN for dashboard k6 (http template uses @ placeholder).
    map $http_x_load_test_bypass $limit_req_key {
        default $binary_remote_addr;
        pe-hackathon-k6-edge-bypass "";
    }
    limit_req_zone $limit_req_key zone=api_limit:16m rate=100r/s;
    limit_req_status 429;

    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_types application/json text/plain text/css application/javascript text/xml application/xml;

    upstream url_shortener {
        least_conn;
        keepalive 64;
        keepalive_requests 1000;
        keepalive_timeout 60s;
        server url-shortener-a:5000 max_fails=3 fail_timeout=30s;
        server url-shortener-b:5000 max_fails=3 fail_timeout=30s;
    }

    # Shared proxy settings for HTTP and HTTPS
    proxy_connect_timeout 10s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;
    proxy_http_version 1.1;

    server {
        listen 80;
        server_name _;

        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

        location / {
            limit_req zone=api_limit burst=200 nodelay;

            proxy_pass http://url_shortener;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $trace_id;
            proxy_set_header Connection "";

            proxy_hide_header Server;
        }
    }

    server {
        listen 443 ssl;
        server_name _;

        ssl_certificate /etc/nginx/certs/server.crt;
        ssl_certificate_key /etc/nginx/certs/server.key;
        ssl_protocols TLSv1.2 TLSv1.3;

        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

        location / {
            limit_req zone=api_limit burst=200 nodelay;

            proxy_pass http://url_shortener;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header X-Request-ID $trace_id;
            proxy_set_header Connection "";

            proxy_hide_header Server;
        }
    }

    server {
        listen 8081;
        server_name _;

        location /nginx_status {
            stub_status on;
            allow 127.0.0.1;
            allow 172.16.0.0/12;
            allow 10.0.0.0/8;
            allow 192.168.0.0/16;
            deny all;
        }
    }
}

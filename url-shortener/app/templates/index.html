<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>URL Shortener</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            min-height: 100vh;
        }
        .container { max-width: 800px; margin: 0 auto; padding: 2rem 1rem; }
        h1 {
            text-align: center;
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #818cf8, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .subtitle {
            text-align: center;
            color: #94a3b8;
            margin-bottom: 2rem;
        }
        .card {
            background: #1e293b;
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            border: 1px solid #334155;
        }
        .form-group { margin-bottom: 1rem; }
        label {
            display: block;
            font-size: 0.875rem;
            color: #94a3b8;
            margin-bottom: 0.35rem;
        }
        input[type="text"], input[type="url"], input[type="number"] {
            width: 100%;
            padding: 0.7rem 1rem;
            border: 1px solid #334155;
            border-radius: 8px;
            background: #0f172a;
            color: #e2e8f0;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }
        input:focus { border-color: #818cf8; }
        .row { display: flex; gap: 1rem; }
        .row .form-group { flex: 1; }
        button {
            padding: 0.7rem 1.5rem;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        button:hover { opacity: 0.85; }
        .btn-primary {
            background: linear-gradient(135deg, #818cf8, #c084fc);
            color: #fff;
            width: 100%;
            font-weight: 600;
        }
        .result {
            display: none;
            margin-top: 1rem;
            padding: 1rem;
            background: #0f172a;
            border-radius: 8px;
            border: 1px solid #334155;
        }
        .result.show { display: block; }
        .result.error { border-color: #f87171; }
        .result.success { border-color: #34d399; }
        .short-url {
            font-size: 1.2rem;
            color: #818cf8;
            word-break: break-all;
        }
        .short-url a { color: #818cf8; text-decoration: none; }
        .short-url a:hover { text-decoration: underline; }
        .copy-btn {
            background: #334155;
            color: #e2e8f0;
            font-size: 0.8rem;
            padding: 0.4rem 0.8rem;
            margin-left: 0.5rem;
        }
        .error-text { color: #f87171; }
        h2 {
            font-size: 1.25rem;
            margin-bottom: 1rem;
            color: #cbd5e1;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            text-align: left;
            padding: 0.6rem 0.75rem;
            border-bottom: 1px solid #334155;
            font-size: 0.875rem;
        }
        th { color: #94a3b8; font-weight: 500; }
        td a { color: #818cf8; text-decoration: none; }
        td a:hover { text-decoration: underline; }
        .status-active { color: #34d399; }
        .status-inactive { color: #f87171; }
        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 1rem;
            margin-top: 1rem;
        }
        .pagination button {
            background: #334155;
            color: #e2e8f0;
            padding: 0.5rem 1rem;
        }
        .pagination button:disabled { opacity: 0.4; cursor: default; }
        .page-info { color: #94a3b8; font-size: 0.875rem; }
        .original-url {
            max-width: 250px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .loading { text-align: center; color: #94a3b8; padding: 2rem; }
        .instance-hud {
            position: fixed;
            top: 0.75rem;
            right: 0.75rem;
            z-index: 100;
            min-width: 220px;
            max-width: min(320px, 92vw);
            padding: 0.75rem 1rem;
            border-radius: 10px;
            background: rgba(15, 23, 42, 0.92);
            border: 1px solid #475569;
            font-size: 0.75rem;
            line-height: 1.45;
            color: #cbd5e1;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.35);
            backdrop-filter: blur(8px);
        }
        .instance-hud h3 {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: #94a3b8;
            margin-bottom: 0.5rem;
            font-weight: 600;
        }
        .instance-hud .id-badge {
            display: inline-block;
            font-size: 1rem;
            font-weight: 700;
            color: #f8fafc;
            background: linear-gradient(135deg, #6366f1, #a855f7);
            padding: 0.15rem 0.55rem;
            border-radius: 6px;
            margin-bottom: 0.5rem;
        }
        .instance-hud dl {
            margin: 0;
            display: grid;
            grid-template-columns: auto 1fr;
            gap: 0.15rem 0.75rem;
        }
        .instance-hud dt { color: #64748b; }
        .instance-hud dd { margin: 0; font-variant-numeric: tabular-nums; text-align: right; }
        .instance-hud .host { font-size: 0.65rem; color: #64748b; word-break: break-all; margin-top: 0.35rem; }
        .instance-hud.error { border-color: #b91c1c; color: #fecaca; }
    </style>
</head>
<body>
    <aside id="instance-hud" class="instance-hud" aria-live="polite">
        <h3>Server instance</h3>
        <div class="id-badge" id="hud-id">—</div>
        <dl>
            <dt>CPU</dt><dd id="hud-cpu">—</dd>
            <dt>RAM</dt><dd id="hud-ram">—</dd>
            <dt>Avg latency</dt><dd id="hud-lat">—</dd>
            <dt>Uptime</dt><dd id="hud-up">—</dd>
            <dt>Requests</dt><dd id="hud-req">—</dd>
            <dt>Threads</dt><dd id="hud-thr">—</dd>
        </dl>
        <div class="host" id="hud-host"></div>
    </aside>

    <div class="container">
        <h1>URL Shortener</h1>
        <p class="subtitle">Shorten your links in seconds</p>

        <div class="card">
            <form id="shorten-form">
                <div class="form-group">
                    <label for="original_url">URL to shorten</label>
                    <input type="url" id="original_url" placeholder="https://example.com/very/long/url" required>
                </div>
                <div class="row">
                    <div class="form-group">
                        <label for="title">Title (optional)</label>
                        <input type="text" id="title" placeholder="My link">
                    </div>
                    <div class="form-group">
                        <label for="short_code">Custom short code (optional)</label>
                        <input type="text" id="short_code" placeholder="my-link">
                    </div>
                </div>
                <div class="form-group">
                    <label for="user_id">User ID</label>
                    <input type="number" id="user_id" value="1" min="1" required>
                </div>
                <button type="submit" class="btn-primary">Shorten URL</button>
            </form>
            <div id="result" class="result"></div>
        </div>

        <div class="card">
            <h2>Recent URLs</h2>
            <div id="urls-table">
                <div class="loading">Loading...</div>
            </div>
            <div class="pagination">
                <button id="prev-btn" onclick="changePage(-1)" disabled>Previous</button>
                <span id="page-info" class="page-info"></span>
                <button id="next-btn" onclick="changePage(1)" disabled>Next</button>
            </div>
        </div>
    </div>

    <script>
        const BASE = window.location.origin;

        function formatUptime(sec) {
            const s = Math.floor(sec);
            const h = Math.floor(s / 3600);
            const m = Math.floor((s % 3600) / 60);
            const r = s % 60;
            if (h > 0) return `${h}h ${m}m`;
            if (m > 0) return `${m}m ${r}s`;
            return `${r}s`;
        }

        async function refreshInstanceHud() {
            const el = document.getElementById('instance-hud');
            try {
                const res = await fetch(`${BASE}/api/instance-stats`);
                if (!res.ok) throw new Error('bad status');
                const d = await res.json();
                el.classList.remove('error');
                document.getElementById('hud-id').textContent = `Instance ${d.instance_id}`;
                document.getElementById('hud-cpu').textContent = `${d.cpu_percent_process}%`;
                document.getElementById('hud-ram').textContent = `${d.memory_rss_mb} MB (${d.memory_percent_process}%)`;
                document.getElementById('hud-lat').textContent = `${d.avg_request_latency_ms} ms`;
                document.getElementById('hud-up').textContent = formatUptime(d.uptime_seconds);
                document.getElementById('hud-req').textContent = String(d.requests_observed);
                document.getElementById('hud-thr').textContent = String(d.threads);
                document.getElementById('hud-host').textContent = d.hostname ? `host: ${d.hostname}` : '';
                if (d.load_average_1m != null) {
                    let la = document.getElementById('hud-load');
                    if (!la) {
                        const dl = el.querySelector('dl');
                        const dt = document.createElement('dt');
                        dt.textContent = 'Load 1m';
                        la = document.createElement('dd');
                        la.id = 'hud-load';
                        dl.appendChild(dt);
                        dl.appendChild(la);
                    }
                    la.textContent = d.load_average_1m.toFixed(2);
                }
            } catch {
                el.classList.add('error');
                document.getElementById('hud-id').textContent = 'Offline';
            }
        }
        refreshInstanceHud();
        setInterval(refreshInstanceHud, 2500);

        let currentPage = 1;
        let totalPages = 1;

        document.getElementById('shorten-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const resultDiv = document.getElementById('result');

            const body = {
                original_url: document.getElementById('original_url').value,
                user_id: parseInt(document.getElementById('user_id').value),
            };

            const title = document.getElementById('title').value.trim();
            if (title) body.title = title;

            const shortCode = document.getElementById('short_code').value.trim();
            if (shortCode) body.short_code = shortCode;

            try {
                const res = await fetch(`${BASE}/shorten`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body),
                });
                const data = await res.json();

                if (!res.ok) {
                    resultDiv.className = 'result show error';
                    resultDiv.innerHTML = `<span class="error-text">${data.error}</span>`;
                    return;
                }

                const shortUrl = `${BASE}/${data.short_code}`;
                resultDiv.className = 'result show success';
                resultDiv.innerHTML = `
                    <span class="short-url">
                        <a href="${shortUrl}" target="_blank">${shortUrl}</a>
                    </span>
                    <button class="copy-btn" onclick="navigator.clipboard.writeText('${shortUrl}')">Copy</button>
                `;
                loadUrls();
            } catch (err) {
                resultDiv.className = 'result show error';
                resultDiv.innerHTML = `<span class="error-text">Failed to connect to server</span>`;
            }
        });

        async function loadUrls() {
            const container = document.getElementById('urls-table');
            try {
                const res = await fetch(`${BASE}/urls?page=${currentPage}&per_page=10`);
                const data = await res.json();
                totalPages = Math.ceil(data.total / data.per_page) || 1;

                if (data.data.length === 0) {
                    container.innerHTML = '<div class="loading">No URLs yet. Create one above!</div>';
                } else {
                    container.innerHTML = `
                        <table>
                            <thead>
                                <tr>
                                    <th>Short Code</th>
                                    <th>Original URL</th>
                                    <th>Title</th>
                                    <th>Status</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${data.data.map(u => `
                                    <tr>
                                        <td><a href="${BASE}/${u.short_code}" target="_blank">${u.short_code}</a></td>
                                        <td class="original-url"><a href="${u.original_url}" target="_blank">${u.original_url}</a></td>
                                        <td>${u.title || '-'}</td>
                                        <td class="${u.is_active ? 'status-active' : 'status-inactive'}">${u.is_active ? 'Active' : 'Inactive'}</td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                    `;
                }

                document.getElementById('page-info').textContent = `Page ${currentPage} of ${totalPages}`;
                document.getElementById('prev-btn').disabled = currentPage <= 1;
                document.getElementById('next-btn').disabled = currentPage >= totalPages;
            } catch (err) {
                container.innerHTML = '<div class="loading">Failed to load URLs</div>';
            }
        }

        function changePage(delta) {
            currentPage += delta;
            loadUrls();
        }

        loadUrls();
    </script>
</body>
</html>

# Config-as-code for the Flask API. In Railway: set this service Root Directory to `url-shortener`
# (or set the service config file path to `/url-shortener/railway.toml`).
# Link Postgres: map DATABASE_URL or set DATABASE_HOST / DATABASE_PORT / DATABASE_USER /
# DATABASE_PASSWORD / DATABASE_NAME from the Railway Postgres plugin variables.

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"
watchPatterns = ["/url-shortener/**"]

[deploy]
healthcheckPath = "/live"
# Migrations run before Gunicorn; allow enough time for DB connect + apply + worker boot.
healthcheckTimeout = 120
# Migrations run in docker-entrypoint.sh (not preDeployCommand) so Railway never parses a
# pre-deploy field. If you still see preDeploy errors, clear "Pre-deploy command" in the
# Railway service Settings → Deploy for this service, then redeploy.
